{% extends "base.html" %}

{% block title %}Add Supplier{% endblock %}

{% block content %}
<h3 class="page-title">Add Supplier</h3>

<div class="card card-soft">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Supplier Name <span class="required-star">*</span></label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Contact Person</label>
                    <input type="text" name="contact_person" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone 1</label>
                    <input type="text" name="phone_1" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone 2</label>
                    <input type="text" name="phone_2" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone 3</label>
                    <input type="text" name="phone_3" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Address</label>
                    <textarea name="address" rows="3" class="form-control"></textarea>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Bank Name</label>
                    <input type="text" name="bank_name" class="form-control">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Bank Branch</label>
                    <input type="text" name="bank_branch" class="form-control">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Account Name</label>
                    <input type="text" name="account_name" class="form-control">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Account Number</label>
                    <input type="text" name="account_number" class="form-control">
                </div>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Supplier</button>
                <a href="{% url 'supplier_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
