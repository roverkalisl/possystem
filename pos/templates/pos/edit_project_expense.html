{% load currency_filters %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Project Expense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-light">

{% if messages %}
    {% for message in messages %}
        <script>alert("{{ message|escapejs }}");</script>
    {% endfor %}
{% endif %}

<div class="container">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Edit Project Expense</h3>
            <a href="{% url 'project_expense_list' %}" class="btn btn-secondary btn-sm">Back</a>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Expense No</label>
                <input type="text" class="form-control" value="{{ expense.expense_no }}" readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">Project</label>
                <input type="text" class="form-control" value="{{ expense.project.project_id }} - {{ expense.project.project_name }}{% if expense.project.location %} | {{ expense.project.location }}{% endif %}" readonly>
                <input type="hidden" name="project" value="{{ expense.project.id }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Expense Type</label>
                <select name="expense_type" class="form-select">
                    <option value="inventory" {% if expense.expense_type == "inventory" %}selected{% endif %}>Inventory Item</option>
                    <option value="direct" {% if expense.expense_type == "direct" %}selected{% endif %}>Direct Item</option>
                    <option value="service" {% if expense.expense_type == "service" %}selected{% endif %}>Service</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Expense Date</label>
                <input type="date" name="expense_date" class="form-control" value="{{ expense.expense_date|date:'Y-m-d' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Item</label>
                <select name="item" class="form-select">
                    <option value="">Select Item</option>
                    {% for item in items %}
                        <option value="{{ item.id }}" {% if expense.item and expense.item.id == item.id %}selected{% endif %}>
                            {{ item.item_code }} - {{ item.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <input type="text" name="description" class="form-control" value="{{ expense.description }}" required>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Qty</label>
                    <input type="number" step="0.01" name="qty" class="form-control" value="{{ expense.qty }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Unit Price</label>
                    <input type="number" step="0.01" name="unit_price" class="form-control" value="{{ expense.unit_price }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Amount</label>
                    <input type="number" step="0.01" name="amount" class="form-control" value="{{ expense.amount }}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">GL Account</label>
                <select name="gl_account" class="form-select">
                    <option value="">Select GL</option>
                    {% for gl in expense_gls %}
                        <option value="{{ gl.id }}" {% if expense.gl_account and expense.gl_account.id == gl.id %}selected{% endif %}>
                            {{ gl.gl_code }} - {{ gl.gl_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button class="btn btn-primary w-100">Update Expense</button>
        </form>
    </div>
</div>

</body>
</html>
