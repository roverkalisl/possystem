{% load currency_filters %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Project Invoice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .card { border-radius: 12px; }
    </style>
</head>
<body class="p-4">

{% if messages %}
    {% for message in messages %}
        <script>alert("{{ message|escapejs }}");</script>
    {% endfor %}
{% endif %}

<div class="container">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Add Project Invoice</h3>
            <div>
                <a href="{% url 'project_invoice_list' %}" class="btn btn-secondary btn-sm">Back</a>
            </div>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Project</label>
                <select name="project" class="form-select" required>
                    <option value="">Select Project</option>
                    {% for p in projects %}
                        <option value="{{ p.id }}">
                            {{ p.project_id }} - {{ p.project_name }}{% if p.location %} | {{ p.location }}{% endif %}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Invoice Date</label>
                <input type="date" name="invoice_date" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Bill To Name</label>
                <input type="text" name="bill_to_name" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Bill To Address</label>
                <textarea name="bill_to_address" class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Invoice Type</label>
                <select name="invoice_type" class="form-select">
                    <option value="advance">Advance</option>
                    <option value="installment">Installment</option>
                    <option value="final">Final Payment</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <input type="text" name="description" class="form-control" required>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Qty</label>
                    <input type="number" step="0.01" name="qty" id="qty" class="form-control" value="1" oninput="calcTotal()">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Item Code</label>
                    <input type="text" name="item_code" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Price Each</label>
                    <input type="number" step="0.01" name="price_each" id="price_each" class="form-control" value="0" oninput="calcTotal()">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Total Amount</label>
                <input type="text" id="total_amount" class="form-control" readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">Note</label>
                <textarea name="note" class="form-control" rows="3"></textarea>
            </div>

            <button class="btn btn-success w-100">Save Invoice</button>
        </form>
    </div>
</div>

<script>
function calcTotal() {
    let qty = parseFloat(document.getElementById("qty").value || 0);
    let price = parseFloat(document.getElementById("price_each").value || 0);
    document.getElementById("total_amount").value = (qty * price).toFixed(2);
}
calcTotal();
</script>

</body>
</html>
