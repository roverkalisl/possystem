{% load currency_filters %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Project Invoice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f9;
            font-size: 14px;
        }
        .invoice-card {
            max-width: 900px;
            margin: 0 auto;
            border-radius: 12px;
        }
        .form-label {
            font-weight: 500;
            margin-bottom: 4px;
            font-size: 13px;
        }
        .form-control,
        .form-select {
            font-size: 14px;
            padding: 0.4rem 0.65rem;
        }
        textarea.form-control {
            min-height: 70px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
        }
        .readonly-box {
            background: #f8f9fa;
        }
    </style>
</head>
<body class="p-3">

{% if messages %}
    {% for message in messages %}
        <script>alert("{{ message|escapejs }}");</script>
    {% endfor %}
{% endif %}

<div class="container-lg">
    <div class="card shadow-sm invoice-card p-3 p-md-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="section-title">Add Project Invoice</div>
            <div>
                <a href="{% url 'project_invoice_list' %}" class="btn btn-secondary btn-sm">Back</a>
            </div>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-2">
                <label class="form-label">Project</label>
                <select name="project" id="project_select" class="form-select form-select-sm" required>
                    <option value="">Select Project</option>
                    {% for p in projects %}
                        <option value="{{ p.id }}"
                                data-client="{{ p.client_name|default:'' }}"
                                data-location="{{ p.location|default:'' }}">
                            {{ p.project_id }} - {{ p.project_name }} - {{ p.client_name }}{% if p.location %} - {{ p.location }}{% endif %}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="row g-2">
                <div class="col-md-4">
                    <label class="form-label">Invoice Date</label>
                    <input type="date" name="invoice_date" class="form-control form-control-sm">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Invoice Type</label>
                    <select name="invoice_type" class="form-select form-select-sm">
                        <option value="advance">Advance</option>
                        <option value="installment">Installment</option>
                        <option value="final">Final Payment</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Qty</label>
                    <input type="number" step="0.01" name="qty" id="qty" class="form-control form-control-sm" value="1" oninput="calcTotal()">
                </div>
            </div>

            <div class="row g-2 mt-1">
                <div class="col-md-6">
                    <label class="form-label">Bill To Name</label>
                    <input type="text" name="bill_to_name" id="bill_to_name" class="form-control form-control-sm">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Price Each</label>
                    <input type="number" step="0.01" name="price_each" id="price_each" class="form-control form-control-sm" value="0" oninput="calcTotal()">
                </div>
            </div>

            <div class="mt-2">
                <label class="form-label">Bill To Address</label>
                <textarea name="bill_to_address" id="bill_to_address" class="form-control form-control-sm" rows="2"></textarea>
            </div>

            <div class="mt-2">
                <label class="form-label">Description</label>
                <input type="text" name="description" class="form-control form-control-sm" required>
            </div>

            <div class="row g-2 mt-1">
                <div class="col-md-6">
                    <label class="form-label">Total Amount</label>
                    <input type="text" id="total_amount" class="form-control form-control-sm readonly-box" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Note</label>
                    <input type="text" name="note" class="form-control form-control-sm">
                </div>
            </div>

            <div class="mt-3">
                <button class="btn btn-success btn-sm w-100">Save Invoice</button>
            </div>
        </form>
    </div>
</div>

<script>
function calcTotal() {
    let qty = parseFloat(document.getElementById("qty").value || 0);
    let price = parseFloat(document.getElementById("price_each").value || 0);
    document.getElementById("total_amount").value = (qty * price).toFixed(2);
}

document.getElementById("project_select").addEventListener("change", function() {
    let selected = this.options[this.selectedIndex];
    document.getElementById("bill_to_name").value = selected.getAttribute("data-client") || "";
    document.getElementById("bill_to_address").value = selected.getAttribute("data-location") || "";
});

calcTotal();
</script>

</body>
</html>
