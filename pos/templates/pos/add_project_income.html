<!DOCTYPE html>
<html>
<head>
    <title>Project Income</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4 bg-light">

<div class="container">
    <div class="card shadow-sm p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Project Income</h4>
            <div>
                <a href="{% url 'project_income_list' %}" class="btn btn-outline-primary btn-sm">Income List</a>
                <a href="{% url 'project_list' %}" class="btn btn-outline-secondary btn-sm">Projects</a>
            </div>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

          <div class="mb-3">
    <label class="form-label">Project</label>
    <select name="project" class="form-select" required>
    <option value="">Select Project</option>
    {% for p in projects %}
        <option value="{{ p.id }}">
            {{ p.project_id }} - {{ p.project_name }} - {{ p.client_name }}{% if p.location %} - {{ p.location }}{% endif %}
        </option>
    {% endfor %}
</select>
</div>
            <div class="mb-3">
                <label class="form-label">Income Date</label>
                <input type="date" name="income_date" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <input type="text" name="description" class="form-control"
                       placeholder="Advance / Progress / Final Payment">
            </div>

            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" step="0.01" name="amount" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">GL Account</label>
                <select name="gl_account" class="form-select">
                    <option value="">Select GL</option>
                    {% for gl in income_gls %}
                        <option value="{{ gl.id }}">
                            {{ gl.gl_code }} - {{ gl.gl_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button class="btn btn-success w-100">Save Income</button>

        </form>

    </div>
</div>

</body>
</html>
