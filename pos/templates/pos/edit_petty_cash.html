{% load currency_filters %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Petty Cash</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-light">

{% if messages %}
    {% for message in messages %}
        <script>alert("{{ message|escapejs }}");</script>
    {% endfor %}
{% endif %}

<div class="container">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Edit Petty Cash</h3>
            <a href="{% url 'petty_cash_list' %}" class="btn btn-secondary btn-sm">Back</a>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Petty Cash No</label>
                <input type="text" class="form-control" value="{{ petty_cash.petty_cash_no }}" readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">Employee</label>
                <select name="employee" class="form-select" required>
                    <option value="">Select Employee</option>
                    {% for e in employees %}
                        <option value="{{ e.id }}" {% if petty_cash.employee.id == e.id %}selected{% endif %}>
                            {{ e.emp_no }} - {{ e.full_name }} | Limit: {{ e.petty_cash_limit|money }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Issue Date</label>
                <input type="date" name="issue_date" class="form-control" value="{{ petty_cash.issue_date|date:'Y-m-d' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Amount Issued</label>
                <input type="number" step="0.01" name="amount_issued" class="form-control" value="{{ petty_cash.amount_issued }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Note</label>
                <textarea name="note" class="form-control" rows="3">{{ petty_cash.note|default:'' }}</textarea>
            </div>

            <button class="btn btn-primary w-100">Update Petty Cash</button>
        </form>
    </div>
</div>

</body>
</html>
