{% extends "base.html" %}
{% load currency_filters %}

{% block title %}Add Employee{% endblock %}

{% block content %}
<div class="card p-3 p-md-4 compact-card-sm">
    <div class="app-card-header">
        <h4 class="app-page-title">Add Employee</h4>
        <div>
            <a href="{% url 'employee_list' %}" class="btn btn-secondary btn-sm">Back</a>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-2">
            <label class="form-label">Linked User</label>
            <select name="user" class="form-select form-select-sm">
                <option value="">Select User</option>
                {% for user in users %}
                <option value="{{ user.id }}">{{ user.username }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="row g-2">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control form-control-sm" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Designation</label>
                <input type="text" name="designation" class="form-control form-control-sm">
            </div>
        </div>

        <div class="mt-2">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-control form-control-sm" rows="2"></textarea>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-6">
                <label class="form-label">Telephone</label>
                <input type="text" name="tel" class="form-control form-control-sm">
            </div>

            <div class="col-md-6">
                <label class="form-label">Petty Cash Limit</label>
                <input type="number" step="0.01" name="petty_cash_limit" class="form-control form-control-sm text-money" value="0">
            </div>
        </div>

        <div class="mt-2">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="is_active" id="is_active" checked>
                <label class="form-check-label" for="is_active">
                    Active
                </label>
            </div>
        </div>

        <div class="mt-3">
            <button class="btn btn-primary btn-sm w-100">Save Employee</button>
        </div>
    </form>
</div>
{% endblock %}
