<div class="row g-3">
    <div class="col-md-3">
        <label class="form-label">PO No</label>
        <input type="text" class="form-control" value="{% if order %}{{ order.po_no }}{% else %}{{ next_po_no }}{% endif %}" readonly>
    </div>

    <div class="col-md-3">
        <label class="form-label">PO Date</label>
        <input type="date" name="po_date" class="form-control" value="{% if order %}{{ order.po_date|date:'Y-m-d' }}{% endif %}">
    </div>

    <div class="col-md-3">
        <label class="form-label">Delivery Date Required</label>
        <input type="date" name="delivery_date_required" class="form-control" value="{% if order %}{{ order.delivery_date_required|date:'Y-m-d' }}{% endif %}">
    </div>

    <div class="col-md-3">
        <label class="form-label">Status</label>
        <select name="status" class="form-select">
            <option value="draft" {% if order and order.status == 'draft' %}selected{% endif %}>Draft</option>
            <option value="pending" {% if order and order.status == 'pending' or not order %}selected{% endif %}>Pending</option>
            <option value="approved" {% if order and order.status == 'approved' %}selected{% endif %}>Approved</option>
            <option value="rejected" {% if order and order.status == 'rejected' %}selected{% endif %}>Rejected</option>
            <option value="closed" {% if order and order.status == 'closed' %}selected{% endif %}>Closed</option>
        </select>
    </div>

    <div class="col-md-6">
        <label class="form-label">Supplier <span class="required-star">*</span></label>
        <select name="supplier" class="form-select" required>
            <option value="">-- Select Supplier --</option>
            {% for s in suppliers %}
                <option value="{{ s.id }}" {% if order and order.supplier_id == s.id %}selected{% endif %}>{{ s.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-6">
        <label class="form-label">Project</label>
        <select name="project" class="form-select">
            <option value="">-- Select Project --</option>
            {% for p in projects %}
                <option value="{{ p.id }}" {% if order and order.project_id == p.id %}selected{% endif %}>{{ p.project_id }} - {{ p.project_name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-6">
        <label class="form-label">Supplier Address</label>
        <textarea name="supplier_address" rows="2" class="form-control">{% if order %}{{ order.supplier_address|default:'' }}{% endif %}</textarea>
    </div>

    <div class="col-md-6">
        <label class="form-label">Supplier Contact Details</label>
        <input type="text" name="supplier_contact_details" class="form-control" value="{% if order %}{{ order.supplier_contact_details|default:'' }}{% endif %}">
    </div>

    <div class="col-md-4">
        <label class="form-label">Payment Method</label>
        <select name="payment_method" class="form-select">
            <option value="cash" {% if order and order.payment_method == 'cash' %}selected{% endif %}>Cash</option>
            <option value="bank" {% if order and order.payment_method == 'bank' or not order %}selected{% endif %}>Bank Transfer</option>
            <option value="cheque" {% if order and order.payment_method == 'cheque' %}selected{% endif %}>Cheque</option>
        </select>
    </div>

    <div class="col-md-8">
        <label class="form-label">Payment Period</label>
        <input type="text" name="payment_period" class="form-control" value="{% if order %}{{ order.payment_period|default:'' }}{% endif %}" placeholder="Advance / 30 days / etc.">
    </div>

    <div class="col-md-4">
        <label class="form-label">Delivery Location</label>
        <input type="text" name="delivery_location" class="form-control" value="{% if order %}{{ order.delivery_location|default:'' }}{% endif %}">
    </div>

    <div class="col-md-4">
        <label class="form-label">Delivery Method</label>
        <input type="text" name="delivery_method" class="form-control" value="{% if order %}{{ order.delivery_method|default:'' }}{% endif %}">
    </div>

    <div class="col-md-4">
        <label class="form-label">Authorized Person Name</label>
        <input type="text" name="authorized_person_name" class="form-control" value="{% if order %}{{ order.authorized_person_name|default:'' }}{% endif %}">
    </div>

    <div class="col-md-4">
        <label class="form-label">Special Instructions</label>
        <textarea name="special_instructions" rows="2" class="form-control">{% if order %}{{ order.special_instructions|default:'' }}{% endif %}</textarea>
    </div>

    <div class="col-md-12">
        <label class="form-label">Item Details</label>
        <div id="po-items">
            {% if order %}
                {% for row in order.items.all %}
                <div class="row g-2 mb-2 po-item-row">
                    <div class="col-md-3">
                        <select name="item_id[]" class="form-select item-select" onchange="onItemSelectChange(this)">
                            <option value="">-- Select Item --</option>
                            {% for item in items %}
                                <option value="{{ item.id }}" data-item-name="{{ item.name }}" data-item-code="{{ item.item_code }}" data-item-unit="{{ item.unit }}" {% if row.item_id == item.id %}selected{% endif %}>{{ item.item_code }} - {{ item.name }} ({{ item.unit }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="text" name="item_description[]" class="form-control item-description" value="{{ row.description }}" placeholder="Description">
                        <div class="form-text text-muted">Choose existing item for inventory-linked PO items.</div>
                    </div>
                    <div class="col-md-2">
                        <input type="number" step="0.01" min="0" name="item_qty[]" class="form-control" value="{{ row.quantity }}">
                    </div>
                    <div class="col-md-2">
                        <input type="number" step="0.01" min="0" name="item_price[]" class="form-control" value="{{ row.unit_price }}">
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="button" class="btn btn-outline-danger" onclick="removePoRow(this)">Remove</button>
                    </div>
                </div>
                {% empty %}
                <div class="row g-2 mb-2 po-item-row">
                    <div class="col-md-3">
                        <select name="item_id[]" class="form-select item-select" onchange="onItemSelectChange(this)">
                            <option value="">-- Select Item --</option>
                            {% for item in items %}
                                <option value="{{ item.id }}" data-item-name="{{ item.name }}" data-item-code="{{ item.item_code }}" data-item-unit="{{ item.unit }}">{{ item.item_code }} - {{ item.name }} ({{ item.unit }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="text" name="item_description[]" class="form-control item-description" placeholder="Description">
                        <div class="form-text text-muted">Choose existing item for inventory-linked PO items.</div>
                    </div>
                    <div class="col-md-2">
                        <input type="number" step="0.01" min="0" name="item_qty[]" class="form-control" placeholder="Qty">
                    </div>
                    <div class="col-md-2">
                        <input type="number" step="0.01" min="0" name="item_price[]" class="form-control" placeholder="Unit Price">
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="button" class="btn btn-outline-danger" onclick="removePoRow(this)">Remove</button>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div class="row g-2 mb-2 po-item-row">
                    <div class="col-md-3">
                        <select name="item_id[]" class="form-select item-select" onchange="onItemSelectChange(this)">
                            <option value="">-- Select Item --</option>
                            {% for item in items %}
                                <option value="{{ item.id }}" data-item-name="{{ item.name }}" data-item-code="{{ item.item_code }}" data-item-unit="{{ item.unit }}">{{ item.item_code }} - {{ item.name }} ({{ item.unit }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="text" name="item_description[]" class="form-control item-description" placeholder="Description">
                        <div class="form-text text-muted">Choose existing item for inventory-linked PO items.</div>
                    </div>
                    <div class="col-md-2">
                        <input type="number" step="0.01" min="0" name="item_qty[]" class="form-control" placeholder="Qty">
                    </div>
                    <div class="col-md-2">
                        <input type="number" step="0.01" min="0" name="item_price[]" class="form-control" placeholder="Unit Price">
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="button" class="btn btn-outline-danger" onclick="removePoRow(this)">Remove</button>
                    </div>
                </div>
            {% endif %}
        </div>
        <button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="addPoRow()">Add Item Row</button>
    </div>

    <div class="col-md-6">
        <label class="form-label">Terms & Conditions</label>
        <textarea name="terms_and_conditions" rows="3" class="form-control">{% if order %}{{ order.terms_and_conditions|default:'' }}{% endif %}</textarea>
    </div>

    <div class="col-md-6">
        <label class="form-label">Warranty Details</label>
        <textarea name="warranty_details" rows="3" class="form-control">{% if order %}{{ order.warranty_details|default:'' }}{% endif %}</textarea>
    </div>

    <div class="col-md-6">
        <label class="form-label">Return Policy</label>
        <textarea name="return_policy" rows="3" class="form-control">{% if order %}{{ order.return_policy|default:'' }}{% endif %}</textarea>
    </div>

    <div class="col-md-6">
        <label class="form-label">Penalties / Conditions</label>
        <textarea name="penalties_conditions" rows="3" class="form-control">{% if order %}{{ order.penalties_conditions|default:'' }}{% endif %}</textarea>
    </div>

    <div class="col-md-6">
        <label class="form-label">Signature Text</label>
        <input type="text" name="signature_text" class="form-control" value="{% if order %}{{ order.signature_text|default:'' }}{% endif %}">
    </div>

    <div class="col-md-6">
        <label class="form-label">Note</label>
        <textarea name="note" rows="2" class="form-control">{% if order %}{{ order.note|default:'' }}{% endif %}</textarea>
    </div>
</div>

<script>
const supplierDetails = {
    {% for s in suppliers %}
    "{{ s.id }}": {
        address: `{{ s.address|default:""|escapejs }}`,
        contact: `{{ s.contact_person|default:"" }}{% if s.phone_1 %} Phone: {{ s.phone_1 }}{% endif %}{% if s.phone_2 %}, {{ s.phone_2 }}{% endif %}{% if s.phone_3 %}, {{ s.phone_3 }}{% endif %}{% if s.email %} Email: {{ s.email }}{% endif %}`.trim(),
    }{% if not forloop.last %},{% endif %}
    {% endfor %}
};

const supplierSelect = document.querySelector('select[name="supplier"]');
if (supplierSelect) {
    const fillSupplierFields = function () {
        const selected = supplierDetails[supplierSelect.value];
        const addressInput = document.querySelector('textarea[name="supplier_address"]');
        const contactInput = document.querySelector('input[name="supplier_contact_details"]');

        if (addressInput) {
            addressInput.value = selected ? selected.address : '';
        }
        if (contactInput) {
            contactInput.value = selected ? selected.contact : '';
        }
    };

    supplierSelect.addEventListener('change', fillSupplierFields);
    if (supplierSelect.value) {
        const addressInput = document.querySelector('textarea[name="supplier_address"]');
        const contactInput = document.querySelector('input[name="supplier_contact_details"]');
        if ((addressInput && !addressInput.value.trim()) || (contactInput && !contactInput.value.trim())) {
            fillSupplierFields();
        }
    }
}

const poItemOptions = `
    <option value="">-- Select Item --</option>
    {% for item in items %}
        <option value="{{ item.id }}" data-item-name="{{ item.name }}" data-item-code="{{ item.item_code }}" data-item-unit="{{ item.unit }}">{{ item.item_code }} - {{ item.name }} ({{ item.unit }})</option>
    {% endfor %}
`;

function addPoRow() {
    const wrap = document.getElementById("po-items");
    const row = document.createElement("div");
    row.className = "row g-2 mb-2 po-item-row";
    row.innerHTML = `
        <div class="col-md-3">
            <select name="item_id[]" class="form-select item-select" onchange="onItemSelectChange(this)">
                ${poItemOptions}
            </select>
        </div>
        <div class="col-md-3">
            <input type="text" name="item_description[]" class="form-control item-description" placeholder="Description">
            <div class="form-text text-muted">Choose existing item for inventory-linked PO items.</div>
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" min="0" name="item_qty[]" class="form-control" placeholder="Qty">
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" min="0" name="item_price[]" class="form-control" placeholder="Unit Price">
        </div>
        <div class="col-md-2 d-grid">
            <button type="button" class="btn btn-outline-danger" onclick="removePoRow(this)">Remove</button>
        </div>
    `;
    wrap.appendChild(row);
}

function onItemSelectChange(select) {
    const row = select.closest(".po-item-row");
    const descInput = row.querySelector(".item-description");
    const selectedOption = select.selectedOptions[0];
    if (selectedOption && selectedOption.value && descInput && !descInput.value.trim()) {
        descInput.value = selectedOption.dataset.itemName || "";
    }
}

function removePoRow(btn) {
    const rows = document.querySelectorAll(".po-item-row");
    if (rows.length > 1) {
        btn.closest(".po-item-row").remove();
    }
}
</script>
