<!DOCTYPE html>
<html>
<head>
    <title>POS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-3">

    <div class="d-flex justify-content-between mb-3">
        <h3>POS</h3>

        <div>
            <a href="{% url 'add_item' %}" class="btn btn-success btn-sm">+ Add Item</a>
            <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>

    <!-- SEARCH -->
    <form method="GET" class="mb-3">
        <input type="text" name="q" value="{{ query }}" class="form-control" placeholder="Search...">
    </form>

    <div class="row">
        {% for item in items %}
        <div class="col-md-3 mb-3">
            <div class="card p-2" onclick="addToCart({{ item.id }}, '{{ item.name }}', {{ item.selling_price }}, {{ item.stock }})">
                <h6>{{ item.name }}</h6>
                <small>Stock: {{ item.stock }}</small><br>
                <strong>Rs {{ item.selling_price }}</strong>
            </div>
        </div>
        {% endfor %}
    </div>

    <hr>

    <h5>Cart</h5>
    <table class="table">
        <tbody id="cart-body"></tbody>
    </table>

    <button class="btn btn-primary" onclick="saveSale()">Save Sale</button>

</div>

<script>
let cart = [];

function addToCart(id, name, price, stock) {
    cart.push({id, name, price, qty:1, stock});
    render();
}

function render() {
    let html = "";
    cart.forEach(i => {
        html += `<tr><td>${i.name}</td><td>${i.qty}</td></tr>`;
    });
    document.getElementById("cart-body").innerHTML = html;
}

function saveSale() {
    fetch('/save-sale/', {
        method: 'POST',
        headers: {'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token }}'},
        body: JSON.stringify({items:cart})
    }).then(r=>r.json()).then(d=>{
        alert("Saved");
        location.reload();
    });
}
</script>

</body>
</html>
