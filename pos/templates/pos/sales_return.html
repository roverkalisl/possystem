<!DOCTYPE html>
<html>
<head>
    <title>Sales Return</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <div class="card p-4 shadow">

        <h3>Sales Return</h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-2">
                <label>Invoice</label>
                <select name="sale" class="form-control">
                    {% for sale in sales %}
                        <option value="{{ sale.id }}">{{ sale.invoice_no }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-2">
                <label>Item ID</label>
                <input type="number" name="item" class="form-control">
            </div>

            <div class="mb-2">
                <label>Qty</label>
                <input type="number" name="qty" class="form-control">
            </div>

            <div class="mb-2">
                <label>Return Type</label>
                <select name="return_type" class="form-control">
                    <option value="refund">Refund</option>
                    <option value="replace">Replace</option>
                    <option value="repair">Repair</option>
                </select>
            </div>

            <div class="mb-2">
                <label>Reason</label>
                <textarea name="reason" class="form-control"></textarea>
            </div>

            <button class="btn btn-danger mt-3">Process Return</button>
        </form>

    </div>
</div>

</body>
</html>
