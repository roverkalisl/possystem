{% extends "base.html" %}
{% load currency_filters %}

{% block title %}Sales Return{% endblock %}

{% block content %}
<div class="card p-3 p-md-4 compact-card">
    <div class="app-card-header">
        <h4 class="app-page-title">Sales Return</h4>
        <div>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary btn-sm">Dashboard</a>
        </div>
    </div>

    <form method="POST" id="returnForm">
        {% csrf_token %}

        <div class="mb-2">
            <label class="form-label">Sale Invoice</label>
            <select name="sale" id="saleSelect" class="form-select form-select-sm" required>
                <option value="">Select Invoice</option>
                {% for sale in sales %}
                <option value="{{ sale.id }}">{{ sale.invoice_no }} - Rs. {{ sale.grand_total|money }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-2">
            <label class="form-label">Sale Item</label>
            <select name="sale_item" id="saleItemSelect" class="form-select form-select-sm" required>
                <option value="">Select Item</option>
            </select>
        </div>

        <div class="row g-2">
            <div class="col-md-4">
                <label class="form-label">Qty</label>
                <input type="number" step="0.01" name="qty" class="form-control form-control-sm" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Return Type</label>
                <select name="return_type" class="form-select form-select-sm">
                    <option value="refund">Refund</option>
                    <option value="replace">Replace</option>
                    <option value="repair">Repair</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Reason</label>
                <input type="text" name="reason" class="form-control form-control-sm">
            </div>
        </div>

        <div class="mt-3">
            <button class="btn btn-primary btn-sm w-100">Save Return</button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById("saleSelect").addEventListener("change", function() {
    const saleId = this.value;
    const itemSelect = document.getElementById("saleItemSelect");
    itemSelect.innerHTML = '<option value="">Loading...</option>';

    if (!saleId) {
        itemSelect.innerHTML = '<option value="">Select Item</option>';
        return;
    }

    fetch(`/sale-items/${saleId}/`)
        .then(response => response.json())
        .then(data => {
            itemSelect.innerHTML = '<option value="">Select Item</option>';
            data.items.forEach(item => {
                const option = document.createElement("option");
                option.value = item.sale_item_id;
                option.textContent = `${item.item_name} | Qty: ${item.qty} | Price: ${item.price}`;
                itemSelect.appendChild(option);
            });
        })
        .catch(() => {
            itemSelect.innerHTML = '<option value="">Failed to load items</option>';
        });
});
</script>
{% endblock %}
