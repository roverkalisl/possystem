{% extends "base.html" %}

{% block title %}Add Customer{% endblock %}

{% block content %}
<h3 class="page-title">Add Customer</h3>

<div class="card card-soft">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Customer Code</label>
                    <input type="text" class="form-control" value="{{ next_customer_code }}" readonly>
                </div>

                <div class="col-md-9">
                    <label class="form-label">Customer Name <span class="required-star">*</span></label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Credit Limit</label>
                    <input type="number" step="0.01" min="0" name="credit_limit" class="form-control" value="0.00">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Registration No <span class="required-star">*</span></label>
                    <input type="text" name="registration_no" class="form-control" required>
                </div>

                <div class="col-md-12">
                    <label class="form-label">Address</label>
                    <textarea name="address" rows="3" class="form-control"></textarea>
                </div>

                <div class="col-md-12">
                    <label class="form-label">Receivable GL Account</label>
                    <select name="receivable_gl_account" class="form-select">
                        <option value="">-- Select GL Account --</option>
                        {% for gl in gl_list %}
                            <option value="{{ gl.id }}">{{ gl.gl_code }} - {{ gl.gl_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save Customer
                </button>
                <a href="{% url 'customer_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
