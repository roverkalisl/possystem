{% extends "base.html" %}

{% block title %}Add Project Expense{% endblock %}

{% block content %}
<div class="card p-3 p-md-4 compact-card">
    <div class="app-card-header">
        <h4 class="app-page-title">Add Project Expense</h4>
        <div>
            <a href="{% url 'project_expense_list' %}" class="btn btn-secondary btn-sm">Back</a>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-2">
            <label class="form-label">Project</label>
            <select name="project" class="form-select form-select-sm" required>
                <option value="">Select Project</option>
                {% for p in projects %}
                <option value="{{ p.id }}">
                    {{ p.project_id }} - {{ p.project_name }} - {{ p.client_name }}{% if p.location %} - {{ p.location }}{% endif %}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="row g-2">
            <div class="col-md-4">
                <label class="form-label">Expense Type</label>
                <select name="expense_type" class="form-select form-select-sm">
                    <option value="direct">Direct Item</option>
                    <option value="inventory">Inventory Item</option>
                    <option value="service">Service</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Expense Date</label>
                <input type="date" name="expense_date" class="form-control form-control-sm">
            </div>

            <div class="col-md-4">
                <label class="form-label">Item</label>
                <select name="item" class="form-select form-select-sm">
                    <option value="">Select Item</option>
                    {% for item in items %}
                    <option value="{{ item.id }}">{{ item.item_code }} - {{ item.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="mt-2">
            <label class="form-label">Description</label>
            <input type="text" name="description" class="form-control form-control-sm" required>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-4">
                <label class="form-label">Qty</label>
                <input type="number" step="0.01" name="qty" id="qty" class="form-control form-control-sm" value="1" oninput="calcAmount()">
            </div>
            <div class="col-md-4">
                <label class="form-label">Unit Price</label>
                <input type="number" step="0.01" name="unit_price" id="unit_price" class="form-control form-control-sm" value="0" oninput="calcAmount()">
            </div>
            <div class="col-md-4">
                <label class="form-label">Amount</label>
                <input type="number" step="0.01" name="amount" id="amount" class="form-control form-control-sm">
            </div>
        </div>

        <div class="mt-2">
            <label class="form-label">GL Account</label>
            <select name="gl_account" class="form-select form-select-sm">
                <option value="">Select GL Account</option>
                {% for gl in expense_gls %}
                <option value="{{ gl.id }}">{{ gl.gl_code }} - {{ gl.gl_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mt-3">
            <button class="btn btn-primary btn-sm w-100">Save Expense</button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
function calcAmount() {
    let qty = parseFloat(document.getElementById("qty").value || 0);
    let price = parseFloat(document.getElementById("unit_price").value || 0);
    document.getElementById("amount").value = (qty * price).toFixed(2);
}
calcAmount();
</script>
{% endblock %}
