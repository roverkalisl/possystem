<!DOCTYPE html>
<html>
<head>
    <title>Add GL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="container">

    <h3 class="mb-3">➕ Add GL Account</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>GL Code</label>
            <input name="gl_code" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>GL Name</label>
            <input name="gl_name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>GL Type</label>
            <select name="gl_type" class="form-control">
                <option value="asset">Asset</option>
                <option value="liability">Liability</option>
                <option value="equity">Equity</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Parent Group</label>
            <input name="parent_group" class="form-control">
        </div>

        <button class="btn btn-success w-100">Save</button>
    </form>

</div>

</body>
</html>
