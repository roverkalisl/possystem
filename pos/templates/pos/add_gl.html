{% extends "base.html" %}

{% block title %}Add GL{% endblock %}

{% block content %}
<div class="card p-3 p-md-4 compact-card-sm">
    <div class="app-card-header">
        <h4 class="app-page-title">Add GL Account</h4>
        <div>
            <a href="{% url 'gl_list' %}" class="btn btn-secondary btn-sm">Back</a>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="row g-2">
            <div class="col-md-6">
                <label class="form-label">GL Code</label>
                <input type="text" name="gl_code" class="form-control form-control-sm" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">GL Name</label>
                <input type="text" name="gl_name" class="form-control form-control-sm" required>
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-6">
                <label class="form-label">GL Type</label>
                <select name="gl_type" class="form-select form-select-sm" required>
                    <option value="">Select Type</option>
                    <option value="asset">Asset</option>
                    <option value="liability">Liability</option>
                    <option value="equity">Equity</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Parent Group</label>
                <input type="text" name="parent_group" class="form-control form-control-sm">
            </div>
        </div>

        <div class="mt-2">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control form-control-sm" rows="2"></textarea>
        </div>

        <div class="mt-3">
            <button class="btn btn-primary btn-sm w-100">Save GL Account</button>
        </div>
    </form>
</div>
{% endblock %}
