<!DOCTYPE html>
<html>
<head>
    <title>Add Project Expense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .card { border-radius: 12px; }
    </style>
</head>
<body class="p-4">

<div class="container">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>➕ Add Project Expense</h3>
            <div>
                <a href="{% url 'project_expense_list' %}" class="btn btn-info btn-sm">Expense List</a>
                <a href="{% url 'project_list' %}" class="btn btn-secondary btn-sm">Projects</a>
            </div>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Project</label>
                <select name="project" class="form-select" required>
                    <option value="">Select Project</option>
                    {% for p in projects %}
                        <option value="{{ p.id }}">{{ p.project_id }} - {{ p.project_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Expense Date</label>
                <input type="date" name="expense_date" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <input type="text" name="description" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">GL Account</label>
                <select name="gl_account" class="form-select">
                    <option value="">Select GL</option>
                    {% for gl in expense_gls %}
                        <option value="{{ gl.id }}">{{ gl.gl_code }} - {{ gl.gl_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Linked Item (optional)</label>
                <select name="item" class="form-select">
                    <option value="">Select Item</option>
                    {% for item in items %}
                        <option value="{{ item.id }}">{{ item.item_code }} - {{ item.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Qty</label>
                    <input type="number" step="0.01" name="qty" value="0" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Unit Price</label>
                    <input type="number" step="0.01" name="unit_price" value="0" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Amount</label>
                    <input type="number" step="0.01" name="amount" value="0" class="form-control" required>
                </div>
            </div>

            <button class="btn btn-success w-100">💾 Save Expense</button>
        </form>
    </div>
</div>

</body>
</html>
