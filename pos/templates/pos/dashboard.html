<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        .card {
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
        }
        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Welcome, {{ request.user.username }}</h2>

    <div class="row">

        <!-- POS -->
        <div class="col-md-4 mb-3">
            <div class="card p-4 text-center shadow" onclick="location.href='{% url 'pos' %}'">
                <h3>🛒 POS System</h3>
                <p>Billing & Sales</p>
            </div>
        </div>

        <!-- PROJECT -->
        <div class="col-md-4 mb-3">
            <div class="card p-4 text-center shadow" onclick="location.href='{% url 'project_list' %}'">
                <h3>🏗 Project System</h3>
                <p>Projects & BOQ</p>
            </div>
        </div>

        <!-- GL -->
        <div class="col-md-4 mb-3">
            <div class="card p-4 text-center shadow" onclick="location.href='{% url 'gl_list' %}'">
                <h3>📘 GL Master</h3>
                <p>Accounts & Costing</p>
            </div>
        </div>

    </div>

    <div class="mt-4">
        <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
    </div>

</div>

</body>
</html>
