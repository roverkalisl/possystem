<!DOCTYPE html>
<html>
<head>
    <title>Add Item</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f9;
        }
        .form-card {
            max-width: 850px;
            margin: 30px auto;
            background: #fff;
            border-radius: 14px;
            padding: 24px;
        }
        .section-title {
            font-weight: 700;
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">Add Item</h3>
            <a href="{% url 'pos' %}" class="btn btn-secondary">Back to POS</a>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="section-title">Basic Details</div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Item code</label>
                    <input type="text" name="item_code" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select">
                        <option value="">---------</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Unit</label>
                    <input type="text" name="unit" class="form-control" value="pcs">
                </div>
            </div>

            <div class="section-title">Pricing & Stock</div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Cost price</label>
                    <input type="number" step="0.01" name="cost_price" class="form-control" value="0">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Selling price</label>
                    <input type="number" step="0.01" name="selling_price" class="form-control" value="0">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number" name="stock" class="form-control" value="0">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Reorder level</label>
                    <input type="number" name="reorder_level" class="form-control" value="0">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Warranty days</label>
                    <input type="number" name="warranty_days" class="form-control" value="0">
                </div>
            </div>

            <div class="section-title">Purchase Info</div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Purchase date</label>
                    <input type="date" name="purchase_date" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Supplier</label>
                    <select name="supplier" class="form-select">
                        <option value="">---------</option>
                        {% for sup in suppliers %}
                            <option value="{{ sup.id }}">{{ sup.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="section-title">Usage</div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Item type</label>
                    <select name="item_type" class="form-select">
                        <option value="retail">Retail</option>
                        <option value="project">Project</option>
                        <option value="both">Both</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3 d-flex align-items-center">
                    <div class="form-check mt-4">
                        <input class="form-check-input" type="checkbox" name="is_service" id="is_service">
                        <label class="form-check-label" for="is_service">
                            Is service
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-success">Save Item</button>
        </form>
    </div>
</div>

</body>
</html>
