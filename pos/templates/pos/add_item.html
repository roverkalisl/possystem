{% extends "base.html" %}

{% block title %}Add Item{% endblock %}

{% block content %}
<div class="card p-3 p-md-4 compact-card">
    <div class="app-card-header">
        <h4 class="app-page-title">Add Item</h4>
        <div class="d-flex gap-2 flex-wrap">
            <a href="{% url 'item_list' %}" class="btn btn-outline-primary btn-sm">Item List</a>

        </div>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="row g-2">
            <div class="col-md-4">
                <label class="form-label">Item Code</label>
                <input type="text" name="item_code" class="form-control form-control-sm"
                       value="{{ next_item_code }}" readonly>
            </div>

            <div class="col-md-8">
                <label class="form-label">Item Name</label>
                <input type="text" name="name" class="form-control form-control-sm" required>
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-4">
                <label class="form-label">Category</label>
                <select name="category" class="form-select form-select-sm">
                    <option value="">Select Category</option>
                    {% for c in categories %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Supplier</label>
                <select name="supplier" class="form-select form-select-sm">
                    <option value="">Select Supplier</option>
                    {% for s in suppliers %}
                    <option value="{{ s.id }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Unit</label>
                <input type="text" name="unit" class="form-control form-control-sm" value="pcs">
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-4">
                <label class="form-label">Cost Price</label>
                <input type="number" step="0.01" name="cost_price" class="form-control form-control-sm" value="0">
            </div>

            <div class="col-md-4">
                <label class="form-label">Selling Price</label>
                <input type="number" step="0.01" name="selling_price" class="form-control form-control-sm" value="0">
            </div>

            <div class="col-md-4">
                <label class="form-label">Opening Stock</label>
                <input type="number" step="0.01" name="stock" class="form-control form-control-sm" value="0">
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-4">
                <label class="form-label">Purchase Date</label>
                <input type="date" name="purchase_date" class="form-control form-control-sm">
            </div>

            <div class="col-md-4">
                <label class="form-label">Item Type</label>
                <select name="item_type" class="form-select form-select-sm">
                    <option value="retail">Retail</option>
                    <option value="project">Project</option>
                    <option value="service">Service</option>
                </select>
            </div>

            <div class="col-md-4 d-flex align-items-end">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_service" id="is_service">
                    <label class="form-check-label" for="is_service">
                        Is Service
                    </label>
                </div>
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-4 d-flex align-items-end">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="allow_discount" id="allow_discount" checked>
                    <label class="form-check-label" for="allow_discount">
                        Allow Discount
                    </label>
                </div>
            </div>

            <div class="col-md-8">
                <label class="form-label">Max Discount Per Unit</label>
                <input type="number" step="0.01" name="max_discount_value" class="form-control form-control-sm" value="0">
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-4">
                <label class="form-label">Reorder Level</label>
                <input type="number" step="0.01" name="reorder_level" class="form-control form-control-sm" value="0">
            </div>

            <div class="col-md-4">
                <label class="form-label">Warranty Days</label>
                <input type="number" name="warranty_days" class="form-control form-control-sm" value="0">
            </div>

            <div class="col-md-4"></div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-6">
                <label class="form-label">Retail GL Account</label>
                <select name="retail_gl_account" class="form-select form-select-sm">
                    <option value="">Select GL Account</option>
                    {% for gl in gl_list %}
                    <option value="{{ gl.id }}">{{ gl.gl_code }} - {{ gl.gl_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Cost GL Account</label>
              <select name="gl_account" class="form-select form-select-sm" required>
                    <option value="">Select GL Account</option>
                    {% for gl in gl_list %}
                    <option value="{{ gl.id }}">{{ gl.gl_code }} - {{ gl.gl_name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Save Item</button>
        </div>
    </form>
</div>
{% endblock %}
