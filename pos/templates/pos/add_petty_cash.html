{% load currency_filters %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Petty Cash</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f9;
            font-size: 14px;
        }
        .form-card {
            max-width: 850px;
            margin: 0 auto;
            border-radius: 12px;
        }
        .form-label {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .form-control, .form-select {
            font-size: 14px;
            padding: .42rem .65rem;
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body class="p-3">

{% if messages %}
    {% for message in messages %}
        <script>alert("{{ message|escapejs }}");</script>
    {% endfor %}
{% endif %}

<div class="container-lg">
    <div class="card shadow-sm form-card p-3 p-md-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="section-title">Add Petty Cash</div>
            <div>
                <a href="{% url 'petty_cash_list' %}" class="btn btn-secondary btn-sm">Back</a>
            </div>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-2">
                <label class="form-label">Employee</label>
                <select name="employee" class="form-select form-select-sm" required>
                    <option value="">Select Employee</option>
                    {% for e in employees %}
                        <option value="{{ e.id }}">
                            {{ e.emp_no }} - {{ e.full_name }} | Limit: Rs. {{ e.petty_cash_limit|money }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="row g-2">
                <div class="col-md-6">
                    <label class="form-label">Issue Date</label>
                    <input type="date" name="issue_date" class="form-control form-control-sm">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Amount Issued</label>
                    <input type="number" step="0.01" name="amount_issued" class="form-control form-control-sm" required>
                </div>
            </div>

            <div class="mt-2">
                <label class="form-label">Note</label>
                <textarea name="note" class="form-control form-control-sm" rows="2"></textarea>
            </div>

            <div class="mt-3">
                <button class="btn btn-success btn-sm w-100">Save Petty Cash</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
