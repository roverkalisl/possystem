<!DOCTYPE html>
<html>
<head>
    <title>Add Petty Cash</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .card { border-radius: 12px; }
    </style>
</head>
<body class="p-4">

<div class="container">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Add Project Petty Cash</h3>
            <div>
                <a href="{% url 'petty_cash_list' %}" class="btn btn-info btn-sm">Petty Cash List</a>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary btn-sm">Dashboard</a>
            </div>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">User</label>
                <select name="user" class="form-select" required>
                    <option value="">Select User</option>
                    {% for u in users %}
                        <option value="{{ u.id }}">
                            {% if u.get_full_name %}{{ u.get_full_name }}{% else %}{{ u.username }}{% endif %}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Issue Date</label>
                <input type="date" name="issue_date" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Amount Issued</label>
                <input type="number" step="0.01" name="amount_issued" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Note</label>
                <textarea name="note" class="form-control" rows="3"></textarea>
            </div>

            <button class="btn btn-success w-100">Save Petty Cash</button>
        </form>
    </div>
</div>

</body>
</html>
