<!DOCTYPE html>
<html>
<head>
    <title>Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="container">

    <div class="d-flex justify-content-between mb-3">
        <h3>Projects</h3>
        <a href="{% url 'create_project' %}" class="btn btn-primary">+ New Project</a>
    </div>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Project ID</th>
                <th>Name</th>
                <th>Type</th>
                <th>Client</th>
                <th>Value</th>
            </tr>
        </thead>

        <tbody>
            {% for p in projects %}
            <tr>
                <td>{{ p.project_id }}</td>
                <td>{{ p.project_name }}</td>
                <td>{{ p.get_project_type_display }}</td>
                <td>{{ p.client_name }}</td>
                <td>{{ p.estimated_value }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
