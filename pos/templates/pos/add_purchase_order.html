{% extends "base.html" %}
{% block title %}Add Purchase Asset{% endblock %}

{% block content %}
<h3 class="page-title">Add Purchase Asset</h3>

<div class="card card-soft">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">PO No</label>
                    <input type="text" class="form-control" value="{{ next_po_no }}" readonly>
                </div>

                <div class="col-md-3">
                    <label class="form-label">PO Date</label>
                    <input type="date" name="po_date" class="form-control">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Delivery Date Required</label>
                    <input type="date" name="delivery_date_required" class="form-control">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option value="draft">Draft</option>
                        <option value="pending" selected>Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                        <option value="closed">Closed</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Supplier <span class="required-star">*</span></label>
                    <select name="supplier" class="form-select" required>
                        <option value="">-- Select Supplier --</option>
                        {% for s in suppliers %}
                            <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Project</label>
                    <select name="project" class="form-select">
                        <option value="">-- Select Project --</option>
                        {% for p in projects %}
                            <option value="{{ p.id }}">{{ p.project_id }} - {{ p.project_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                   <div class="col-md-6">
                    <label class="form-label">Supplier Address</label>
                    <textarea name="supplier_address" rows="2" class="form-control"></textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Supplier Contact Details</label>
                    <input type="text" name="supplier_contact_details" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Payment Method</label>
                    <select name="payment_method" class="form-select">
                        <option value="cash">Cash</option>
                        <option value="bank" selected>Bank Transfer</option>
                        <option value="cheque">Cheque</option>
                    </select>
                </div>

                <div class="col-md-8">
                    <label class="form-label">Payment Period</label>
                    <input type="text" name="payment_period" class="form-control" placeholder="Advance / 30 days / etc.">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Delivery Location</label>
                    <input type="text" name="delivery_location" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Delivery Method</label>
                    <input type="text" name="delivery_method" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Authorized Person Name</label>
                    <input type="text" name="authorized_person_name" class="form-control">
                </div>

                <div class="col-md-12">
                    <label class="form-label">Special Instructions</label>
                    <textarea name="special_instructions" rows="2" class="form-control"></textarea>
                </div>

                <div class="col-md-12">
                    <label class="form-label">Item Details</label>
                    <div id="po-items">
                        <div class="row g-2 mb-2 po-item-row">
                            <div class="col-md-6">
                                <input type="text" name="item_description[]" class="form-control" placeholder="Description">
                            </div>
                            <div class="col-md-2">
                                <input type="number" step="0.01" min="0" name="item_qty[]" class="form-control" placeholder="Qty">
                            </div>
                            <div class="col-md-2">
                                <input type="number" step="0.01" min="0" name="item_price[]" class="form-control" placeholder="Unit Price">
                            </div>
                            <div class="col-md-2 d-grid">
                                <button type="button" class="btn btn-outline-danger" onclick="removePoRow(this)">Remove</button>
                            </div>
                        </div>
                    </div>
                    <button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="addPoRow()">Add Item Row</button>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Terms & Conditions</label>
                    <textarea name="terms_and_conditions" rows="3" class="form-control"></textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Warranty Details</label>
                    <textarea name="warranty_details" rows="3" class="form-control"></textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Return Policy</label>
                    <textarea name="return_policy" rows="3" class="form-control"></textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Penalties / Conditions</label>
                    <textarea name="penalties_conditions" rows="3" class="form-control"></textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Signature Text</label>
                    <input type="text" name="signature_text" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Note</label>
                    <textarea name="note" rows="2" class="form-control"></textarea>
                </div>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save PO</button>
                <a href="{% url 'purchase_order_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
function addPoRow() {
    const wrap = document.getElementById("po-items");
    const row = document.createElement("div");
    row.className = "row g-2 mb-2 po-item-row";
    row.innerHTML = `
        <div class="col-md-6">
            <input type="text" name="item_description[]" class="form-control" placeholder="Description">
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" min="0" name="item_qty[]" class="form-control" placeholder="Qty">
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" min="0" name="item_price[]" class="form-control" placeholder="Unit Price">
        </div>
        <div class="col-md-2 d-grid">
            <button type="button" class="btn btn-outline-danger" onclick="removePoRow(this)">Remove</button>
        </div>
    `;
    wrap.appendChild(row);
}
function removePoRow(btn) {
    const rows = document.querySelectorAll(".po-item-row");
    if (rows.length > 1) {
        btn.closest(".po-item-row").remove();
    }
}
</script>
{% endblock %}
