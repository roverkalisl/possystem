{% extends "base.html" %}

{% block title %}Edit Supplier{% endblock %}

{% block content %}
<h3 class="page-title">Edit Supplier</h3>

<div class="card card-soft">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Supplier Name <span class="required-star">*</span></label>
                    <input type="text" name="name" class="form-control" value="{{ supplier.name }}" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Contact Person</label>
                    <input type="text" name="contact_person" class="form-control" value="{{ supplier.contact_person|default:'' }}">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ supplier.phone|default:'' }}">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ supplier.email|default:'' }}">
                </div>

                <div class="col-md-12">
                    <label class="form-label">Address</label>
                    <textarea name="address" rows="3" class="form-control">{{ supplier.address|default:'' }}</textarea>
                </div>

                <div class="col-md-12">
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
                               {% if supplier.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">
                            Active
                        </label>
                    </div>
                </div>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Update Supplier
                </button>
                <a href="{% url 'supplier_list' %}" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
