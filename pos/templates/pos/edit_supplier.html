{% extends "base.html" %}
{% load currency_filters %}

{% block title %}Edit Supplier{% endblock %}

{% block content %}
<h3 class="page-title">Edit Supplier</h3>

<div class="card card-soft">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Supplier Name <span class="required-star">*</span></label>
                    <input type="text" name="name" class="form-control" value="{{ supplier.name }}" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Contact Person</label>
                    <input type="text" name="contact_person" class="form-control" value="{{ supplier.contact_person|default:'' }}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone 1</label>
                    <input type="text" name="phone_1" class="form-control" value="{{ supplier.phone_1|default:'' }}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone 2</label>
                    <input type="text" name="phone_2" class="form-control" value="{{ supplier.phone_2|default:'' }}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone 3</label>
                    <input type="text" name="phone_3" class="form-control" value="{{ supplier.phone_3|default:'' }}">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ supplier.email|default:'' }}">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Address</label>
                    <textarea name="address" rows="3" class="form-control">{{ supplier.address|default:'' }}</textarea>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Bank Name</label>
                    <input type="text" name="bank_name" class="form-control" value="{{ supplier.bank_name|default:'' }}">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Bank Branch</label>
                    <input type="text" name="bank_branch" class="form-control" value="{{ supplier.bank_branch|default:'' }}">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Account Name</label>
                    <input type="text" name="account_name" class="form-control" value="{{ supplier.account_name|default:'' }}">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Account Number</label>
                    <input type="text" name="account_number" class="form-control" value="{{ supplier.account_number|default:'' }}">
                </div>

                <div class="col-md-12">
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if supplier.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Active</label>
                    </div>
                </div>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Update Supplier</button>
                <a href="{% url 'supplier_list' %}" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
