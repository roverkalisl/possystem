{% extends "base.html" %}

{% block title %}Edit Item{% endblock %}

{% block content %}
<div class="card p-3 p-md-4 compact-card">
    <div class="app-card-header">
        <h4 class="app-page-title">Edit Item</h4>
        <div class="d-flex gap-2 flex-wrap">
            <a href="{% url 'item_list' %}" class="btn btn-outline-primary btn-sm">Item List</a>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary btn-sm">Dashboard</a>
        </div>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="row g-2">
            <div class="col-md-4">
                <label class="form-label">Item Code</label>
                <input type="text" name="item_code" class="form-control form-control-sm"
                       value="{{ item.item_code }}" required>
            </div>

            <div class="col-md-8">
                <label class="form-label">Item Name</label>
                <input type="text" name="name" class="form-control form-control-sm"
                       value="{{ item.name }}" required>
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-4">
                <label class="form-label">Category</label>
                <select name="category" class="form-select form-select-sm">
                    <option value="">Select Category</option>
                    {% for c in categories %}
                    <option value="{{ c.id }}" {% if item.category and item.category.id == c.id %}selected{% endif %}>
                        {{ c.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Supplier</label>
                <select name="supplier" class="form-select form-select-sm">
                    <option value="">Select Supplier</option>
                    {% for s in suppliers %}
                    <option value="{{ s.id }}" {% if item.supplier and item.supplier.id == s.id %}selected{% endif %}>
                        {{ s.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Unit</label>
                <input type="text" name="unit" class="form-control form-control-sm" value="{{ item.unit }}">
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-4">
                <label class="form-label">Cost Price</label>
                <input type="number" step="0.01" name="cost_price" class="form-control form-control-sm"
                       value="{{ item.cost_price }}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Selling Price</label>
                <input type="number" step="0.01" name="selling_price" class="form-control form-control-sm"
                       value="{{ item.selling_price }}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Stock</label>
                <input type="number" step="0.01" name="stock" class="form-control form-control-sm"
                       value="{{ item.stock }}">
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-4">
                <label class="form-label">Purchase Date</label>
                <input type="date" name="purchase_date" class="form-control form-control-sm"
                       value="{% if item.purchase_date %}{{ item.purchase_date|date:'Y-m-d' }}{% endif %}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Item Type</label>
                <select name="item_type" class="form-select form-select-sm">
                    <option value="retail" {% if item.item_type == "retail" %}selected{% endif %}>Retail</option>
                    <option value="project" {% if item.item_type == "project" %}selected{% endif %}>Project</option>
                    <option value="service" {% if item.item_type == "service" %}selected{% endif %}>Service</option>
                </select>
            </div>

            <div class="col-md-4 d-flex align-items-end">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_service" id="is_service"
                           {% if item.is_service %}checked{% endif %}>
                    <label class="form-check-label" for="is_service">
                        Is Service
                    </label>
                </div>
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-4 d-flex align-items-end">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="allow_discount" id="allow_discount"
                           {% if item.allow_discount %}checked{% endif %}>
                    <label class="form-check-label" for="allow_discount">
                        Allow Discount
                    </label>
                </div>
            </div>

            <div class="col-md-8">
                <label class="form-label">Max Discount Per Unit</label>
                <input type="number" step="0.01" name="max_discount_value"
                       class="form-control form-control-sm"
                       value="{{ item.max_discount_value }}">
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-4">
                <label class="form-label">Reorder Level</label>
                <input type="number" step="0.01" name="reorder_level" class="form-control form-control-sm"
                       value="{{ item.reorder_level }}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Warranty Days</label>
                <input type="number" name="warranty_days" class="form-control form-control-sm"
                       value="{{ item.warranty_days }}">
            </div>

            <div class="col-md-4"></div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-6">
                <label class="form-label">Retail GL Account</label>
                <select name="retail_gl_account" class="form-select form-select-sm">
                    <option value="">Select GL Account</option>
                    {% for gl in gl_list %}
                    <option value="{{ gl.id }}" {% if item.retail_gl_account and item.retail_gl_account.id == gl.id %}selected{% endif %}>
                        {{ gl.gl_code }} - {{ gl.gl_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Cost GL Account</label>
                <select name="cost_gl_account" class="form-select form-select-sm">
                    <option value="">Select GL Account</option>
                    {% for gl in gl_list %}
                    <option value="{{ gl.id }}" {% if item.cost_gl_account and item.cost_gl_account.id == gl.id %}selected{% endif %}>
                        {{ gl.gl_code }} - {{ gl.gl_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Update Item</button>
        </div>
    </form>
</div>
{% endblock %}
