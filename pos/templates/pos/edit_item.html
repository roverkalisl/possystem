<!DOCTYPE html>
<html>
<head>
    <title>Edit Item</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        .card { border-radius: 12px; }
        .section-title {
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 10px;
            color: #555;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="card shadow-sm p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>✏️ Edit Item</h3>
            <div>
                <a href="{% url 'item_list' %}" class="btn btn-info btn-sm">Items</a>
                <a href="{% url 'pos' %}" class="btn btn-secondary btn-sm">POS</a>
            </div>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="row">

                <div class="section-title">Basic Information</div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Item Code</label>
                    <input type="text" name="item_code" value="{{ item.item_code }}" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Item Name</label>
                    <input type="text" name="name" value="{{ item.name }}" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select">
                        <option value="">---------</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if item.category and item.category.id == cat.id %}selected{% endif %}>
                                {{ cat.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Supplier</label>
                    <select name="supplier" class="form-select">
                        <option value="">---------</option>
                        {% for sup in suppliers %}
                            <option value="{{ sup.id }}" {% if item.supplier and item.supplier.id == sup.id %}selected{% endif %}>
                                {{ sup.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Unit</label>
                    <input type="text" name="unit" value="{{ item.unit }}" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Item Type</label>
                    <select name="item_type" class="form-select">
                        <option value="retail" {% if item.item_type == "retail" %}selected{% endif %}>Retail</option>
                        <option value="project" {% if item.item_type == "project" %}selected{% endif %}>Project</option>
                        <option value="both" {% if item.item_type == "both" %}selected{% endif %}>Both</option>
                        <option value="expense" {% if item.item_type == "expense" %}selected{% endif %}>Expense</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3 d-flex align-items-center">
                    <div class="form-check mt-4">
                        <input type="checkbox" name="is_service" class="form-check-input" id="serviceCheck"
                               {% if item.is_service %}checked{% endif %}>
                        <label class="form-check-label" for="serviceCheck">Is Service</label>
                    </div>
                </div>

                <div class="section-title">Pricing</div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Cost Price</label>
                    <input type="number" step="0.01" name="cost_price" value="{{ item.cost_price }}" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Selling Price</label>
                    <input type="number" step="0.01" name="selling_price" value="{{ item.selling_price }}" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number" name="stock" value="{{ item.stock }}" class="form-control">
                </div>

                <div class="section-title">Purchase Details</div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Purchase Date</label>
                    <input type="date" name="purchase_date" value="{{ item.purchase_date|date:'Y-m-d' }}" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Reorder Level</label>
                    <input type="number" name="reorder_level" value="{{ item.reorder_level }}" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Warranty (Days)</label>
                    <input type="number" name="warranty_days" value="{{ item.warranty_days }}" class="form-control">
                </div>

                <div class="section-title">Accounting (GL)</div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Retail Revenue GL</label>
                    <select name="retail_gl_account" class="form-select">
                        <option value="">Select GL</option>
                        {% for gl in gl_list %}
                            <option value="{{ gl.id }}" {% if item.retail_gl_account and item.retail_gl_account.id == gl.id %}selected{% endif %}>
                                {{ gl.gl_code }} - {{ gl.gl_name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Costing GL</label>
                    <select name="cost_gl_account" class="form-select">
                        <option value="">Select GL</option>
                        {% for gl in gl_list %}
                            <option value="{{ gl.id }}" {% if item.cost_gl_account and item.cost_gl_account.id == gl.id %}selected{% endif %}>
                                {{ gl.gl_code }} - {{ gl.gl_name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

            </div>

            <button class="btn btn-success w-100 mt-3">💾 Update Item</button>
        </form>

    </div>
</div>

</body>
</html>
