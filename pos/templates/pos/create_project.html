<!DOCTYPE html>
<html>
<head>
    <title>Create Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="container">
    <h3>Create Project</h3>

    <form method="POST">
        {% csrf_token %}

        <input name="project_name" placeholder="Project Name" class="form-control mb-2">

        <select name="project_type" class="form-control mb-2">
            <option value="BL">Building</option>
            <option value="SW">Swimming Pool</option>
        </select>

        <input name="client_name" placeholder="Client Name" class="form-control mb-2">

        <input name="location" placeholder="Location" class="form-control mb-2">

        <input name="estimated_value" placeholder="Estimated Value" class="form-control mb-2">

        <button class="btn btn-success">Create</button>
    </form>
</div>

</body>
</html>
