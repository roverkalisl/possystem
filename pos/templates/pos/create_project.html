{% extends "base.html" %}
{% load currency_filters %}

{% block title %}Create Project{% endblock %}

{% block content %}
<div class="card p-3 p-md-4 compact-card-sm">
    <div class="app-card-header">
        <h4 class="app-page-title">Create Project</h4>
        <div>
            <a href="{% url 'project_list' %}" class="btn btn-secondary btn-sm">Back</a>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="row g-2">
            <div class="col-md-6">
                <label class="form-label">Project Name</label>
                <input type="text" name="project_name" class="form-control form-control-sm" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Project Type</label>
                <select name="project_type" class="form-select form-select-sm" required>
                    <option value="">Select Type</option>
                    <option value="BL">Building</option>
                    <option value="SW">Swimming Pool</option>
                    <option value="RS">Retail Shop</option>
                </select>
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-6">
                <label class="form-label">Client Name</label>
                <input type="text" name="client_name" class="form-control form-control-sm" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control form-control-sm">
            </div>
        </div>

        <div class="mt-2">
            <label class="form-label">Estimated Value</label>
            <input type="number" step="0.01" name="estimated_value" class="form-control form-control-sm text-money" value="0">
        </div>

        <div class="mt-3">
            <button class="btn btn-primary btn-sm w-100">Save Project</button>
        </div>
    </form>
</div>
{% endblock %}
