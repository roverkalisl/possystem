{% load currency_filters %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-light">

{% if messages %}
    {% for message in messages %}
        <script>alert("{{ message|escapejs }}");</script>
    {% endfor %}
{% endif %}

<div class="container">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Edit Project</h3>
            <a href="{% url 'project_list' %}" class="btn btn-secondary btn-sm">Back</a>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Project ID</label>
                <input type="text" class="form-control" value="{{ project.project_id }}" readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">Project Name</label>
                <input type="text" name="project_name" class="form-control" value="{{ project.project_name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Project Type</label>
                <select name="project_type" class="form-select" required>
                    {% for code, name in project_types %}
                        <option value="{{ code }}" {% if project.project_type == code %}selected{% endif %}>{{ name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Client Name</label>
                <input type="text" name="client_name" class="form-control" value="{{ project.client_name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control" value="{{ project.location|default:'' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Estimated Value</label>
                <input type="number" step="0.01" name="estimated_value" class="form-control" value="{{ project.estimated_value }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <input type="text" name="status" class="form-control" value="{{ project.status }}">
            </div>

            <button class="btn btn-primary w-100">Update Project</button>
        </form>
    </div>
</div>

</body>
</html>
