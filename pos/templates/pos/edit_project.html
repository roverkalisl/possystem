{% extends "base.html" %}
{% load currency_filters %}

{% block title %}Edit Project{% endblock %}

{% block content %}
<div class="card p-3 p-md-4 compact-card-sm">
    <div class="app-card-header">
        <h4 class="app-page-title">Edit Project</h4>
        <div>
            <a href="{% url 'project_list' %}" class="btn btn-secondary btn-sm">Back</a>
        </div>
    </div>

    <div class="info-box mb-3">
        <small class="text-muted">Project ID</small><br>
        <strong>{{ project.project_id }}</strong>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="row g-2">
            <div class="col-md-6">
                <label class="form-label">Project Name</label>
                <input type="text" name="project_name" class="form-control form-control-sm" value="{{ project.project_name }}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Project Type</label>
                <select name="project_type" class="form-select form-select-sm" required>
                    {% for code, name in project_types %}
                    <option value="{{ code }}" {% if project.project_type == code %}selected{% endif %}>{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-6">
                <label class="form-label">Client Name</label>
                <input type="text" name="client_name" class="form-control form-control-sm" value="{{ project.client_name }}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control form-control-sm" value="{{ project.location }}">
            </div>
        </div>

        <div class="row g-2 mt-1">
            <div class="col-md-6">
                <label class="form-label">Estimated Value</label>
                <input type="number" step="0.01" name="estimated_value" class="form-control form-control-sm text-money" value="{{ project.estimated_value }}">
            </div>

            <div class="col-md-6">
                <label class="form-label">Status</label>
                <input type="text" name="status" class="form-control form-control-sm" value="{{ project.status }}">
            </div>
        </div>

        <div class="mt-3">
            <button class="btn btn-primary btn-sm w-100">Update Project</button>
        </div>
    </form>
</div>
{% endblock %}
