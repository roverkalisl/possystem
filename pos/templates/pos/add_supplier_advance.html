{% extends "base.html" %}
{% block title %}Add Supplier Advance{% endblock %}

{% block content %}
<h3 class="page-title">Add Supplier Advance</h3>

<div class="card card-soft">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Advance No</label>
                    <input type="text" class="form-control" value="{{ next_advance_no }}" readonly>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Advance Date</label>
                    <input type="date" name="advance_date" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">PO Number</label>
                    <select name="po" id="po_id" class="form-select">
                        <option value="">-- Select PO --</option>
                        {% for po in purchase_orders %}
                            <option value="{{ po.id }}">
                                {{ po.po_no }} - {{ po.supplier.name }}
                                {% if po.project %} - {{ po.project.project_id }}{% endif %}
                            </option>
                        {% endfor %}
                    </select>
                    <small class="text-muted">PO එකක් තෝරනවා නම් related details auto-fill වේ.</small>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Buyer Company</label>
                    <input type="text" id="buyer_company_name" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Buyer Contact Person</label>
                    <input type="text" id="buyer_contact_person" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Buyer Phone</label>
                    <input type="text" id="buyer_phone" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Supplier Name</label>
                    <input type="text" id="supplier_name_display" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Supplier Address</label>
                    <input type="text" id="supplier_address_display" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Supplier Contact</label>
                    <input type="text" id="supplier_contact_display" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Project Display</label>
                    <input type="text" id="project_name_display" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Delivery Location</label>
                    <input type="text" id="delivery_location_display" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Delivery Method</label>
                    <input type="text" id="delivery_method_display" class="form-control" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Supplier <span class="required-star">*</span></label>
                    <select name="supplier" id="supplier_id" class="form-select" required>
                        <option value="">-- Select Supplier --</option>
                        {% for s in suppliers %}
                            <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Project</label>
                    <select name="project" id="project_id" class="form-select">
                        <option value="">-- Select Project --</option>
                        {% for p in projects %}
                            <option value="{{ p.id }}">{{ p.project_id }} - {{ p.project_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Payment Period</label>
                    <input type="text" id="payment_period_display" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Amount <span class="required-star">*</span></label>
                    <input type="number" step="0.01" min="0" name="amount" id="amount" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Payment Method</label>
                    <select name="payment_method" class="form-select">
                        <option value="cash">Cash</option>
                        <option value="card">Card</option>
                        <option value="bank">Bank Transfer</option>
                        <option value="cheque">Cheque</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Paid From GL <span class="required-star">*</span></label>
                    <select name="paid_from_gl" class="form-select" required>
                        <option value="">-- Select GL --</option>
                        {% for gl in gl_list %}
                            <option value="{{ gl.id }}">{{ gl.gl_code }} - {{ gl.gl_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Advance GL <span class="required-star">*</span></label>
                    <select name="advance_gl" class="form-select" required>
                        <option value="">-- Select GL --</option>
                        {% for gl in gl_list %}
                            <option value="{{ gl.id }}">{{ gl.gl_code }} - {{ gl.gl_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-12">
                    <label class="form-label">Note</label>
                    <textarea name="note" id="note" rows="3" class="form-control"></textarea>
                </div>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Advance</button>
                <a href="{% url 'supplier_advance_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const poSelect = document.getElementById("po_id");
    const supplierField = document.getElementById("supplier_id");
    const projectField = document.getElementById("project_id");
    const amountField = document.getElementById("amount");
    const noteField = document.getElementById("note");

    const buyerCompanyField = document.getElementById("buyer_company_name");
    const buyerContactField = document.getElementById("buyer_contact_person");
    const buyerPhoneField = document.getElementById("buyer_phone");

    const supplierNameField = document.getElementById("supplier_name_display");
    const supplierAddressField = document.getElementById("supplier_address_display");
    const supplierContactField = document.getElementById("supplier_contact_display");

    const projectNameField = document.getElementById("project_name_display");
    const deliveryLocationField = document.getElementById("delivery_location_display");
    const deliveryMethodField = document.getElementById("delivery_method_display");
    const paymentPeriodField = document.getElementById("payment_period_display");

    function clearPoLoadedFields() {
        if (buyerCompanyField) buyerCompanyField.value = "";
        if (buyerContactField) buyerContactField.value = "";
        if (buyerPhoneField) buyerPhoneField.value = "";

        if (supplierNameField) supplierNameField.value = "";
        if (supplierAddressField) supplierAddressField.value = "";
        if (supplierContactField) supplierContactField.value = "";

        if (projectNameField) projectNameField.value = "";
        if (deliveryLocationField) deliveryLocationField.value = "";
        if (deliveryMethodField) deliveryMethodField.value = "";
        if (paymentPeriodField) paymentPeriodField.value = "";
    }

    function unlockManualFields() {
        if (supplierField) supplierField.disabled = false;
        if (projectField) projectField.disabled = false;
    }

    function lockPoFields() {
        if (supplierField) supplierField.disabled = true;
        if (projectField) projectField.disabled = true;
    }

    if (!poSelect) return;

    poSelect.addEventListener("change", function () {
        const poId = this.value;

        if (!poId) {
            clearPoLoadedFields();
            unlockManualFields();
            return;
        }

        fetch(`/purchase-orders/${poId}/data/`)
            .then(response => response.json())
            .then(data => {
                if (supplierField) supplierField.value = data.supplier_id || "";
                if (projectField) projectField.value = data.project_id || "";
                if (amountField) amountField.value = data.amount || data.estimated_amount || "";
                if (noteField) noteField.value = data.note || "";

                if (buyerCompanyField) buyerCompanyField.value = data.buyer_company_name || "";
                if (buyerContactField) buyerContactField.value = data.buyer_contact_person || "";
                if (buyerPhoneField) buyerPhoneField.value = data.buyer_phone || "";

                if (supplierNameField) supplierNameField.value = data.supplier_name || "";
                if (supplierAddressField) supplierAddressField.value = data.supplier_address || "";
                if (supplierContactField) supplierContactField.value = data.supplier_contact_details || "";

                if (projectNameField) {
                    projectNameField.value = data.project_code
                        ? `${data.project_code} - ${data.project_name}`
                        : (data.project_name || "");
                }

                if (deliveryLocationField) deliveryLocationField.value = data.delivery_location || "";
                if (deliveryMethodField) deliveryMethodField.value = data.delivery_method || "";
                if (paymentPeriodField) paymentPeriodField.value = data.payment_period || "";

                lockPoFields();
            })
            .catch(error => {
                console.error("PO data load error:", error);
                alert("PO data load failed");
                unlockManualFields();
            });
    });
});
</script>
{% endblock %}
