{% extends "base.html" %}
{% block title %}Add Supplier Advance{% endblock %}

{% block content %}
<h3 class="page-title">Add Supplier Advance</h3>

<div class="card card-soft">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Advance No</label>
                    <input type="text" class="form-control" value="{{ next_advance_no }}" readonly>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Date</label>
                    <input type="date" name="advance_date" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">PO Number</label>
                    <select name="po" id="po_id" class="form-select">
                        <option value="">-- Select PO --</option>
                        {% for po in purchase_orders %}
                            <option value="{{ po.id }}">{{ po.po_no }} - {{ po.supplier.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Supplier</label>
                    <select name="supplier" id="supplier_id" class="form-select">
                        <option value="">-- Select Supplier --</option>
                        {% for s in suppliers %}
                            <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Project</label>
                    <select name="project" id="project_id" class="form-select">
                        <option value="">-- Select Project --</option>
                        {% for p in projects %}
                            <option value="{{ p.id }}">{{ p.project_id }} - {{ p.project_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Amount <span class="required-star">*</span></label>
                    <input type="number" step="0.01" min="0" name="amount" id="amount" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Payment Method</label>
                    <select name="payment_method" class="form-select">
                        <option value="cash">Cash</option>
                        <option value="card">Card</option>
                        <option value="bank">Bank Transfer</option>
                        <option value="cheque">Cheque</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Paid From GL <span class="required-star">*</span></label>
                    <select name="paid_from_gl" class="form-select" required>
                        <option value="">-- Select GL --</option>
                        {% for gl in gl_list %}
                            <option value="{{ gl.id }}">{{ gl.gl_code }} - {{ gl.gl_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-12">
                    <label class="form-label">Advance GL <span class="required-star">*</span></label>
                    <select name="advance_gl" class="form-select" required>
                        <option value="">-- Select GL --</option>
                        {% for gl in gl_list %}
                            <option value="{{ gl.id }}">{{ gl.gl_code }} - {{ gl.gl_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-12">
                    <label class="form-label">Note</label>
                    <textarea name="note" id="note" rows="3" class="form-control"></textarea>
                </div>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Advance</button>
                <a href="{% url 'supplier_advance_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const poSelect = document.getElementById("po_id");
    if (!poSelect) return;

    poSelect.addEventListener("change", function () {
        const poId = this.value;
        if (!poId) return;

        fetch(`/purchase-orders/${poId}/data/`)
            .then(res => res.json())
            .then(data => {
                const supplierField = document.getElementById("supplier_id");
                const projectField = document.getElementById("project_id");
                const amountField = document.getElementById("amount");
                const noteField = document.getElementById("note");

                if (supplierField && data.supplier_id) supplierField.value = data.supplier_id;
                if (projectField && data.project_id) projectField.value = data.project_id;
                if (amountField) amountField.value = data.estimated_amount || "";
                if (noteField) noteField.value = data.note || "";
            });
    });
});
</script>
{% endblock %}
