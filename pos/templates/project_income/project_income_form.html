{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header">
            <h3>{% if income %}Edit{% else %}Add{% endif %} Project Income</h3>
        </div>
        <div class="card-body">

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Project <span class="text-danger">*</span></label>
                        <select name="project" class="form-select" required>
                            <option value="">Select Project</option>
                            {% for project in projects %}
                                <option value="{{ project.id }}"
                                    {% if income and income.project.id == project.id %}selected{% endif %}>
                                    {{ project.project_id }} - {{ project.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Income Date <span class="text-danger">*</span></label>
                        <input type="date" name="income_date" class="form-control"
                               value="{% if income %}{{ income.income_date|date:'Y-m-d' }}{% endif %}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description <span class="text-danger">*</span></label>
                    <input type="text" name="description" class="form-control"
                           value="{% if income %}{{ income.description }}{% endif %}" required>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Received From</label>
                        <input type="text" name="received_from" class="form-control"
                               value="{% if income %}{{ income.received_from }}{% endif %}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Amount <span class="text-danger">*</span></label>
                        <input type="number" step="0.01" name="amount" class="form-control"
                               value="{% if income %}{{ income.amount }}{% endif %}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Payment Method</label>
                        <select name="payment_method" class="form-select">
                            <option value="cash" {% if income and income.payment_method == 'cash' %}selected{% endif %}>Cash</option>
                            <option value="bank" {% if income and income.payment_method == 'bank' %}selected{% endif %}>Bank Transfer</option>
                            <option value="cheque" {% if income and income.payment_method == 'cheque' %}selected{% endif %}>Cheque</option>
                            <option value="card" {% if income and income.payment_method == 'card' %}selected{% endif %}>Card</option>
                            <option value="credit" {% if income and income.payment_method == 'credit' %}selected{% endif %}>Credit</option>
                            <option value="other" {% if income and income.payment_method == 'other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>

                    <div class="col-md-8">
                        <label class="form-label">Reference No</label>
                        <input type="text" name="reference_no" class="form-control"
                               value="{% if income %}{{ income.reference_no }}{% endif %}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Remarks</label>
                    <textarea name="remarks" class="form-control" rows="4">{% if income %}{{ income.remarks }}{% endif %}</textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Save</button>
                    <a href="{% url 'project_income_list' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>

        </div>
    </div>
</div>

{% endblock %}
